version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: chore
      include: scope
    groups:
      nestjs:
        patterns: ["@nestjs/*"]
      typeorm:
        patterns: ["typeorm", "pg", "@nestjs/typeorm"]
      next:
        patterns: ["next", "eslint-config-next", "react", "react-dom"]
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint"]
      prettier:
        patterns: ["prettier*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [ci]
    commit-message:
      prefix: ci
