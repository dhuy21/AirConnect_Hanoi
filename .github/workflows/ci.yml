name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

# Least-privilege default. Individual jobs tighten further when needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run test

  openapi-drift:
    name: OpenAPI contract drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: airconnect
          POSTGRES_PASSWORD: airconnect
          POSTGRES_DB: airconnect_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U airconnect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Minimal env for the backend to bootstrap. Nothing is persisted and no
      # HTTP port is bound; the script just needs TypeORM to initialise.
      DATABASE_URL: postgresql://airconnect:airconnect@localhost:5432/airconnect_ci
      JWT_SECRET: ci-openapi-drift-jwt-secret-not-used-anywhere
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared-types (needed by backend imports)
        run: pnpm --filter @airconnect/shared-types build
      - name: Export OpenAPI + regenerate types
        run: pnpm openapi:codegen
      - name: Fail if committed spec or generated types drifted
        run: |
          if ! git diff --exit-code -- \
              packages/shared-types/openapi.json \
              packages/shared-types/src/generated; then
            echo "::error::OpenAPI contract or generated types are out of date."
            echo "Run 'pnpm openapi:codegen' locally and commit the result."
            exit 1
          fi
